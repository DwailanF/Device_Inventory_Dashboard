<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      background: #F7E2D6;
      color: #202124;
      padding: 20px;
    }
    .page { display: none; }
    .page.active { display: block; }
    .page-title {
      font-size: 11px;
      font-weight: 700;
      color: #3D82D4;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #b0b0b0;
      margin-bottom: 16px;
      padding-bottom: 4px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #3D82D4;
      border-bottom: 1px solid #b0b0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 10px;
      padding-bottom: 4px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    .required-star { color: #9a031e; }
    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #9E9E9E;
      border-radius: 6px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    textarea { resize: vertical; min-height: 64px; }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    .actions-right { display: flex; gap: 10px; align-items: center; }
    button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-cancel { background: #9a031e; border: 1px solid #4c5760; color: #000000; }
    .btn-cancel:hover { background: #f71735; }
    .btn-back { background: #fff; border: 1px solid #9E9E9E; color: #202124; }
    .btn-back:hover { background: #f1f3f4; }
    .btn-next { background: #3D82D4; color: #fff; }
    .btn-next:hover { background: #2D72C4; }
    .btn-save { background: #76b041; color: #000000; border: 1px solid #4c5760; }
    .btn-save:hover { background: #6BF75C; }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }
    .page-indicator { font-size: 11px; color: #5f6368; }
    select#devicepw1, select#devicepw2 { padding: 8px 2px; text-align: center; }
    .toast {
      display: none;
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    .toast.success { background: #E8F5E9; color: #375623; border: 1px solid #81c784; display: block; }
    .toast.error   { background: #FCE4EC; color: #880E4F; border: 1px solid #f48fb1; display: block; }
  </style>
</head>
<body>

  <!-- Page 1: Location Details -->
  <div class="page active" id="page1">
    <div class="page-title">Location Details</div>

    <div class="field">
      <label>Business Name <span class="required-star">*</span></label>
      <input type="text" id="businessname" placeholder="Business name" />
    </div>

    <div class="row2">
      <div class="field">
        <label>Store Number <span class="required-star">*</span></label>
        <input type="text" id="storenum" placeholder="Store #" />
      </div>
      <div class="field">
        <label>Merchant ID <span class="required-star">*</span></label>
        <input type="text" id="mid" placeholder="Merchant ID" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Regional Manager</label>
        <input type="text" id="regmanager" placeholder="Regional Manager" />
      </div>
      <div class="field">
        <label>Location Phone</label>
        <input type="text" id="phone" placeholder="Phone number" />
      </div>
    </div>

    <div class="actions">
      <button class="btn-cancel" onclick="google.script.host.close()">Cancel</button>
      <div class="actions-right">
        <span class="page-indicator">Page 1 of 3</span>
        <button class="btn-next" onclick="goNext(1)">Next</button>
      </div>
    </div>
  </div>

  <!-- Page 2: Devices -->
  <div class="page" id="page2">
    <div class="section-label">Device 1</div>

    <div class="row2">
      <div class="field">
        <label>Model</label>
        <select id="model1">
          <option value="">— Select —</option>
          <option value="RGH9000">RGH9000</option>
          <option value="BPOI9000">BPOI9000</option>
        </select>
      </div>
      <div class="field">
        <label>Serial Number</label>
        <input type="text" id="serial1" placeholder="XX00000-XX000000" />
      </div>
    </div>

    <div class="row3">
      <div class="field">
        <label>Admin PW 1 <span class="required-star">*</span></label>
        <input type="text" id="adminpw1" placeholder="Admin PW 1" />
      </div>
      <div class="field">
        <label>Admin PW 2 <span class="required-star">*</span></label>
        <input type="text" id="adminpw2" placeholder="Admin PW 2" />
      </div>
      <div class="field">
        <label>Admin PW 3 <span class="required-star">*</span></label>
        <input type="text" id="adminpw3" placeholder="Admin PW 3" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Device Password <span class="required-star">*</span></label>
        <select id="devicepw1" onchange="updateDropdownStyle()">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="field">
        <label>Download Date</label>
        <input type="date" id="downloaddate1" />
      </div>
    </div>

    <div class="section-label">Device 2</div>

    <div class="row2">
      <div class="field">
        <label>Model</label>
        <select id="model2">
          <option value="">— Select —</option>
          <option value="RGH9000">RGH9000</option>
          <option value="BPOI9000">BPOI9000</option>
        </select>
      </div>
      <div class="field">
        <label>Serial Number</label>
        <input type="text" id="serial2" placeholder="XX00000-XX000000" />
      </div>
    </div>

    <div class="row3">
      <div class="field">
        <label>Admin PW 1 <span class="required-star">*</span></label>
        <input type="text" id="adminpw1_2" placeholder="Admin PW 1" />
      </div>
      <div class="field">
        <label>Admin PW 2 <span class="required-star">*</span></label>
        <input type="text" id="adminpw2_2" placeholder="Admin PW 2" />
      </div>
      <div class="field">
        <label>Admin PW 3 <span class="required-star">*</span></label>
        <input type="text" id="adminpw3_2" placeholder="Admin PW 3" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Device Password <span class="required-star">*</span></label>
        <select id="devicepw2" onchange="updateDropdownStyle()">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="field">
        <label>Download Date</label>
        <input type="date" id="downloaddate2" />
      </div>
    </div>

    <div class="actions">
      <button class="btn-cancel" onclick="google.script.host.close()">Cancel</button>
      <div class="actions-right">
        <span class="page-indicator">Page 2 of 3</span>
        <button class="btn-back" onclick="goBack(2)">Back</button>
        <button class="btn-next" onclick="goNext(2)">Next</button>
      </div>
    </div>
  </div>

  <!-- Page 3: Notes & Chain Info -->
  <div class="page" id="page3">
    <div class="page-title">Notes & Chain Info</div>

    <div class="field">
      <label>Notes</label>
      <textarea id="notes"></textarea>
    </div>

    <div class="row3">
      <div class="field">
        <label>Chain #</label>
        <input type="text" id="chainnum" placeholder="Chain #" />
      </div>
      <div class="field">
        <label>Chain Name</label>
        <input type="text" id="chainname" placeholder="Chain Name" />
      </div>
      <div class="field">
        <label>Province</label>
        <input type="text" id="province" placeholder="Province" />
      </div>
    </div>

    <div class="actions">
      <button class="btn-cancel" onclick="google.script.host.close()">Cancel</button>
      <div class="actions-right">
        <span class="page-indicator">Page 3 of 3</span>
        <button class="btn-back" onclick="goBack(3)">Back</button>
        <button class="btn-save" id="saveBtn" onclick="save()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    updateDropdownStyle();

    function goNext(page) {
      if (page === 1) {
        const bname = document.getElementById('businessname').value.trim();
        const snum  = document.getElementById('storenum').value.trim();
        const mid   = document.getElementById('mid').value.trim();
        if (!bname || !snum || !mid) {
          showToast('Business Name, Store Number and Merchant ID are required.', 'error');
          return;
        }
        if (!/^\d{3}$/.test(snum)) {
          showToast('Store Number must be exactly 3 digits.', 'error');
          return;
        }
        if (!/^\d{10}$/.test(mid)) {
          showToast('Merchant ID must be exactly 10 digits.', 'error');
          return;
        }
      }

      if (page === 2) {
        const pw1   = document.getElementById('adminpw1').value.trim();
        const pw2   = document.getElementById('adminpw2').value.trim();
        const pw3   = document.getElementById('adminpw3').value.trim();
        const pw1_2 = document.getElementById('adminpw1_2').value.trim();
        const pw2_2 = document.getElementById('adminpw2_2').value.trim();
        const pw3_2 = document.getElementById('adminpw3_2').value.trim();
        const dpw1  = document.getElementById('devicepw1').value;
        const dpw2  = document.getElementById('devicepw2').value;

        if (!pw1 || !pw2 || !pw3 || !pw1_2 || !pw2_2 || !pw3_2) {
          showToast('All Admin Password fields are required.', 'error');
          return;
        }

        const errors = [];
        if (pw1 !== pw1_2) errors.push('Admin PW 1 fields do not match.');
        if (pw2 !== pw2_2) errors.push('Admin PW 2 fields do not match.');
        if (pw3 !== pw3_2) errors.push('Admin PW 3 fields do not match.');
        if (dpw1 !== dpw2) errors.push('Device Passwords do not match.');
        if (errors.length > 0) {
          showToast(errors.join(' '), 'error');
          return;
        }

        if (pw1 === pw2 || pw1 === pw3 || pw2 === pw3) {
          showToast('Device 1: Admin Passwords must all be different.', 'error');
          return;
        }
        if (pw1_2 === pw2_2 || pw1_2 === pw3_2 || pw2_2 === pw3_2) {
          showToast('Device 2: Admin Passwords must all be different.', 'error');
          return;
        }

        const pwPattern = /^\d{6}[A-Za-z]$/;
        const pwFields = ['adminpw1', 'adminpw2', 'adminpw3', 'adminpw1_2', 'adminpw2_2', 'adminpw3_2'];
        for (let i = 0; i < pwFields.length; i++) {
          if (!pwPattern.test(document.getElementById(pwFields[i]).value.trim())) {
            showToast('Invalid password format. Expected: 000000X (6 digits + 1 letter)', 'error');
            return;
          }
        }

        const serialPattern = /^[A-Za-z]{2}\d{5}-[A-Za-z]{2}\d{6}$/;
        const s1 = document.getElementById('serial1').value.trim();
        const s2 = document.getElementById('serial2').value.trim();
        if (s1 && !serialPattern.test(s1)) {
          showToast('Invalid Device 1 serial format. Expected: XX00000-XX000000', 'error');
          return;
        }
        if (s2 && !serialPattern.test(s2)) {
          showToast('Invalid Device 2 serial format. Expected: XX00000-XX000000', 'error');
          return;
        }
      }

      document.getElementById('page' + page).classList.remove('active');
      document.getElementById('page' + (page + 1)).classList.add('active');
    }

    function goBack(page) {
      document.getElementById('page' + page).classList.remove('active');
      document.getElementById('page' + (page - 1)).classList.add('active');
    }

    function updateDropdownStyle() {
      const drop1 = document.getElementById('devicepw1');
      const drop2 = document.getElementById('devicepw2');
      if (!drop1 || !drop2) return;
      const pw1 = drop1.value;
      const pw2 = drop2.value;
      const sdpw = {
        '1': document.getElementById('sdpw1'),
        '2': document.getElementById('sdpw2'),
        '3': document.getElementById('sdpw3')
      };

      Object.values(sdpw).forEach(function(el) { if (el) el.style.background = '#f1f3f4'; });

      if (pw1 === '0') {
        drop1.style.background = '#FFE0B2';
      } else if (pw1 === pw2 && pw1 !== '') {
        drop1.style.background = '#C8E6C9';
      } else {
        drop1.style.background = pw1 ? '#FFF9C4' : '#fff';
      }

      if (pw2 === '0') {
        drop2.style.background = '#FFE0B2';
      } else if (pw1 === pw2 && pw2 !== '') {
        drop2.style.background = '#C8E6C9';
      } else {
        drop2.style.background = pw2 ? '#FFF9C4' : '#fff';
      }

      if (pw1 !== '0' && pw1 !== '' && pw2 !== '0' && pw2 !== '') {
        if (pw1 === pw2) {
          if (sdpw[pw1]) sdpw[pw1].style.background = '#C8E6C9';
        } else {
          if (sdpw[pw1]) sdpw[pw1].style.background = '#FFF9C4';
          if (sdpw[pw2]) sdpw[pw2].style.background = '#FFF9C4';
        }
      } else {
        if (pw1 !== '0' && pw1 !== '' && sdpw[pw1]) sdpw[pw1].style.background = '#FFF9C4';
        if (pw2 !== '0' && pw2 !== '' && sdpw[pw2]) sdpw[pw2].style.background = '#FFF9C4';
      }
    }

    function save() {
      const toast = document.getElementById('toast');
      toast.className = 'toast';
      toast.innerHTML = '';
      toast.innerHTML = 'Are you sure you want to save this location? <button onclick="confirmSave()" style="margin-left:8px;padding:4px 10px;border-radius:4px;border:none;background:#76b041;cursor:pointer;font-weight:600;">✓</button><button onclick="cancelSave()" style="margin-left:6px;padding:4px 10px;border-radius:4px;border:none;background:#9a031e;color:#fff;cursor:pointer;font-weight:600;">✗</button>';
      toast.className = 'toast success';
    }

    function cancelSave() {
      const toast = document.getElementById('toast');
      toast.className = 'toast';
      toast.innerHTML = '';
    }

    function confirmSave() {
      const btn   = document.getElementById('saveBtn');
      const toast = document.getElementById('toast');
      toast.className = 'toast';
      toast.innerHTML = '';

      const form = {
        businessname:  document.getElementById('businessname').value.trim(),
        storenum:      document.getElementById('storenum').value.trim(),
        mid:           document.getElementById('mid').value.trim(),
        regmanager:    document.getElementById('regmanager').value.trim(),
        phone:         document.getElementById('phone').value.trim(),
        model1:        document.getElementById('model1').value,
        serial1:       document.getElementById('serial1').value.trim(),
        adminpw1:      document.getElementById('adminpw1').value.trim(),
        adminpw2:      document.getElementById('adminpw2').value.trim(),
        adminpw3:      document.getElementById('adminpw3').value.trim(),
        devicepw1:     document.getElementById('devicepw1').value,
        downloaddate1: document.getElementById('downloaddate1').value,
        model2:        document.getElementById('model2').value,
        serial2:       document.getElementById('serial2').value.trim(),
        devicepw2:     document.getElementById('devicepw2').value,
        downloaddate2: document.getElementById('downloaddate2').value,
        notes:         document.getElementById('notes').value.trim(),
        chainnum:      document.getElementById('chainnum').value.trim(),
        chainname:     document.getElementById('chainname').value.trim(),
        province:      document.getElementById('province').value.trim()
      };

      btn.disabled = true;
      btn.textContent = 'Saving…';

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.success) {
            showToast(result.message, 'error');
            if (result.message.includes('Merchant ID')) {
              document.getElementById('mid').value = '';
              goBack(3);
              goBack(2);
              setTimeout(function() { document.getElementById('mid').focus(); }, 100);
            }
            btn.disabled = false;
            btn.textContent = 'Save';
            return;
          }
          const clip = form.businessname + ' | Store #' + form.storenum + ' | MID: ' + form.mid;
          navigator.clipboard.writeText(clip).catch(function() {});
          showToast(result.message + ' — Details copied to clipboard!', 'success');
          btn.textContent = 'Saved ✓';
          setTimeout(function() { google.script.host.close(); }, 2000);
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Save';
        })
        .saveNewLocation(form);
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.className = 'toast ' + type;
    }
  </script>
</body>
</html>
