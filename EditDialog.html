<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      background: #F7E2D6;
      color: #202124;
      padding: 20px;
    }
    .record-id {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #3D82D4;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #3D82D4;
      border-bottom: 1px solid #b0b0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 10px;
      padding-bottom: 4px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #9E9E9E;
      border-radius: 6px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }
    .readonly-field {
      background: #f1f3f4;
      border: 1px solid #9E9E9E;
      color: #5f6368;
      cursor: default;
    }
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    textarea { resize: vertical; min-height: 64px; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-cancel { background: #9a031e; border: 1px solid #4c5760; color: #000000; }
    .btn-cancel:hover { background: #f71735; }
    .btn-save { background: #76b041; color: #000000; border: 1px solid #4c5760;}
    .btn-save:hover { background: #6BF75C; }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }
    .toast {
      display: none;
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    select#devicepw1, select#devicepw2 {
      padding: 8px 2px;
      text-align: center;
    }
    .toast.success { background: #E8F5E9; color: #375623; border: 1px solid #81c784; display: block; }
    .toast.error   { background: #FCE4EC; color: #880E4F; border: 1px solid #f48fb1; display: block; }
  </style>
</head>
<body>

  <div class="record-id"><?= storename ?> — Store # <?= storenum ?></div>

  <div class="field">
    <label>MID</label>
    <input type="text" value="<?= mid ?>" readonly class="readonly-field" />
  </div>

  <div class="row3">
    <div class="field">
      <label>SD PW 1</label>
      <input type="text" id="sdpw1" value="<?= sdpw1 ?>" readonly class="readonly-field" />
    </div>
    <div class="field">
      <label>SD PW 2</label>
      <input type="text" id="sdpw2" value="<?= sdpw2 ?>" readonly class="readonly-field" />
    </div>
    <div class="field">
      <label>SD PW 3</label>
      <input type="text" id="sdpw3" value="<?= sdpw3 ?>" readonly class="readonly-field" />
    </div>
  </div>

  <div class="section-label">Device 1</div>

  <div class="row3">
    <div class="field">
      <label>Serial</label>
      <input type="text" id="deviceserial1" value="<?= deviceserial1 ?>" />
    </div>
    <div class="field">
      <label>Password</label>
      <select id="devicepw1" onchange="updateDropdownStyle()">
        <option value="0" <?= devicepw1 == '0' ? 'selected' : '' ?>>0</option>
        <option value="1" <?= devicepw1 == '1' ? 'selected' : '' ?>>1</option>
        <option value="2" <?= devicepw1 == '2' ? 'selected' : '' ?>>2</option>
        <option value="3" <?= devicepw1 == '3' ? 'selected' : '' ?>>3</option>
      </select>
    </div>
    <div class="field">
      <label>Download Date</label>
      <input type="date" id="downloaddate1" value="<?= downloaddate1 ?>" />
    </div>
  </div>

  <div class="section-label">Device 2</div>

  <div class="row3">
    <div class="field">
      <label>Serial</label>
      <input type="text" id="deviceserial2" value="<?= deviceserial2 ?>" />
    </div>
    <div class="field">
      <label>Password</label>
      <select id="devicepw2" onchange="updateDropdownStyle()">
        <option value="0" <?= devicepw2 == '0' ? 'selected' : '' ?>>0</option>
        <option value="1" <?= devicepw2 == '1' ? 'selected' : '' ?>>1</option>
        <option value="2" <?= devicepw2 == '2' ? 'selected' : '' ?>>2</option>
        <option value="3" <?= devicepw2 == '3' ? 'selected' : '' ?>>3</option>
      </select>
    </div>
    <div class="field">
      <label>Download Date</label>
      <input type="date" id="downloaddate2" value="<?= downloaddate2 ?>" />
    </div>
  </div>

  <div class="field">
    <label>Notes</label>
    <textarea id="notes"><?= notes ?></textarea>
  </div>

  <div class="actions">
    <button class="btn-cancel" onclick="google.script.host.close()">Cancel</button>
    <button class="btn-save" id="saveBtn" onclick="save()">Save Changes</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    updateDropdownStyle();

    function updateDropdownStyle() {
      const pw1 = document.getElementById('devicepw1').value;
      const pw2 = document.getElementById('devicepw2').value;
      const drop1 = document.getElementById('devicepw1');
      const drop2 = document.getElementById('devicepw2');
      const sdpw = {
        '1': document.getElementById('sdpw1'),
        '2': document.getElementById('sdpw2'),
        '3': document.getElementById('sdpw3')
      };

      // Reset SD PW backgrounds
      Object.values(sdpw).forEach(function(el) { el.style.background = '#f1f3f4'; });

      // Dropdown colours
      if (pw1 === '0') {
        drop1.style.background = '#FFE0B2';
      } else if (pw1 === pw2 && pw1 !== '') {
        drop1.style.background = '#C8E6C9';
      } else {
        drop1.style.background = pw1 ? '#FFF9C4' : '#fff';
      }

      if (pw2 === '0') {
        drop2.style.background = '#FFE0B2';
      } else if (pw1 === pw2 && pw2 !== '') {
        drop2.style.background = '#C8E6C9';
      } else {
        drop2.style.background = pw2 ? '#FFF9C4' : '#fff';
      }

      // SD PW box highlights
      if (pw1 !== '0' && pw1 !== '' && pw2 !== '0' && pw2 !== '') {
        if (pw1 === pw2) {
          if (sdpw[pw1]) sdpw[pw1].style.background = '#C8E6C9';
        } else {
          if (sdpw[pw1]) sdpw[pw1].style.background = '#FFF9C4';
          if (sdpw[pw2]) sdpw[pw2].style.background = '#FFF9C4';
        }
      } else {
        if (pw1 !== '0' && pw1 !== '' && sdpw[pw1]) sdpw[pw1].style.background = '#FFF9C4';
        if (pw2 !== '0' && pw2 !== '' && sdpw[pw2]) sdpw[pw2].style.background = '#FFF9C4';
      }
    }

    function save() {


      const btn   = document.getElementById('saveBtn');
      const toast = document.getElementById('toast');
      toast.className = 'toast';
      toast.textContent = '';

      const form = {
        deviceserial1: document.getElementById('deviceserial1').value.trim(),
        devicepw1:     document.getElementById('devicepw1').value,
        downloaddate1: document.getElementById('downloaddate1').value,
        deviceserial2: document.getElementById('deviceserial2').value.trim(),
        devicepw2:     document.getElementById('devicepw2').value,
        downloaddate2: document.getElementById('downloaddate2').value,
        notes:         document.getElementById('notes').value.trim()
      };

      if (!form.deviceserial1 || !form.deviceserial2) {
  showToast('Both serial fields are required.', 'error');
  return;
      }

if (!form.deviceserial1 || !form.deviceserial2) {
  showToast('Both serial fields are required.', 'error');
  return;
}

const serialPattern = /^[A-Za-z]{2}\d{5}-[A-Za-z]{2}\d{6}$/;
if (!serialPattern.test(form.deviceserial1) || !serialPattern.test(form.deviceserial2)) {
  showToast('Invalid serial format. Expected: XX00000-XX000000', 'error');
  return;
}

if (form.devicepw1 === '' || form.devicepw2 === '') {
  showToast('Both password fields are required.', 'error');
  return;
}

      btn.disabled = true;
      btn.textContent = 'Saving...';

      google.script.run
        .withSuccessHandler(function(result) {
          showToast(result.message, 'success');
          btn.textContent = 'Saved ✓';
          setTimeout(function() { google.script.host.close(); }, 1200);
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        })
        .saveRecord(<?= rowIndex ?>, form);
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
    }
  </script>
</body>
</html> 
</html>
